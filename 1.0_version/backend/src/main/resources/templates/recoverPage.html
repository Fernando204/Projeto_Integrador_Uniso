<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor - Recuperar Senha</title>
    <link rel="icon" href="/images/icon-logo.png" type="image/png">
    <link rel="stylesheet" href="/styles/authStyle.css">
</head>

<body>
    <div class="split-screen">
        <div class="lateral-container">
            <img src="/images/main-logo.png">
            <h1>Controle sua empresa em um só lugar</h1>
        </div>

        <div class="right-side">
            <div class="card login-card">

                <!-- PASSO 1: Digitar e-mail -->
                <div id="passo-1">
                    <h2>Recuperar Senha</h2>
                    <p class="recover-descricao">Digite seu e-mail e enviaremos um código de recuperação.</p>

                    <fieldset>
                        <div class="field">
                            <label for="recover-email">E-mail</label>
                            <input type="email" id="recover-email" placeholder="Digite seu e-mail">
                        </div>
                    </fieldset>

                    <button id="btn-enviar-codigo">Enviar código</button>
                    <div class="auth-link">
                        <a href="http://localhost:8080/login">Voltar para o login</a>
                    </div>
                </div>

                <!-- PASSO 2: Digitar código + nova senha -->
                <div id="passo-2" style="display:none;">
                    <h2>Redefinir Senha</h2>
                    <p class="recover-descricao">Digite o código recebido no e-mail e sua nova senha.</p>

                    <fieldset>
                        <div class="field">
                            <label for="recover-codigo">Código de verificação</label>
                            <input type="text" id="recover-codigo" placeholder="Digite o código recebido">
                        </div>

                        <div class="field">
                            <label for="nova-senha">Nova senha</label>
                            <input type="password" id="nova-senha" placeholder="Digite sua nova senha">
                        </div>

                        <div class="field">
                            <label for="confirmar-nova-senha">Confirmar nova senha</label>
                            <input type="password" id="confirmar-nova-senha" placeholder="Confirme sua nova senha">
                        </div>
                    </fieldset>

                    <button id="btn-redefinir-senha">Redefinir senha</button>
                    <div class="auth-link">
                        <a href="#" id="btn-voltar-passo1">Voltar</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module" src="scripts/pages/recover.js"></script>
</body>

</html>
