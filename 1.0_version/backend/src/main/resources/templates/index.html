<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor</title>
    <link rel="icon" th:href="@{/images/icon-logo.png}" type="image/png">

    <link rel="stylesheet" href="../static/styles/index.css">
    <link rel="stylesheet" href="../static/components/dashboard/dashboard.css">
    <link rel="stylesheet" href="../static/components/finanças/finance.css">
    <link rel="stylesheet" href="../static/components/vendas/sales.css">
    <link rel="stylesheet" href="../static/components/relatorios/specific/sales.css">
    <link rel="stylesheet" href="../static/components/clientes/clientes.css">
    <link rel="stylesheet" href="../static/components/relatorios/relatorios.css">
    <link rel="stylesheet" href="../static/components/estoque/estoque.css">
    <link rel="stylesheet" href="../static/components/colaboradores/colaboradores.css">

</head>
<body>
    <header class="main-header">
        <div></div>
        <div class="header-div">
            <button class="notification-button">
                <span class="material-icons notification-bt" >notifications</span>
            </button>
            <button class="user-profile-button">
                <span class="material-icons">account_circle</span>
            </button>
            
                <div class="profile-container right-modal-container" id="user-info-modal">
                    <h4>Faça login para acessar seu perfil                          </h4>
                    <button id="gotoLoginBt">Entrar</button>
                </div>

                <div class="notify-container right-modal-container" id="notification-modal">
                    <h4>Nenhuma notificação</h4>
                </div>
        </div>
    </header>

    <div class="flex-half-main-container">
        <div class="navBar">
            <img th:href="@{/images/main-logo.png}" alt="logo-image" class="logo-image">
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">dashboard</span>
                </button>
                <h5>Dashboard</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">account_balance</span>
                </button>
                <h5>Finanças</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">point_of_sale</span>
                </button>
                <h5>Vender</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">groups</span>
                </button>
                <h5>Clientes</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">inventory_2</span>
                </button>
                <h5>Estoque</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">bar_charts</span>
                </button>
                <h5>Relatórios</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">handshake</span>
                </button>
                <h5>Colaboradores</h5>
            </div>
        </div>
    
        <section id="site-content"></section>
    </div>
    
    
    <script type="module" src="../static/components/finanças/finance.js"></script>
    <script type="module" src="../static/components/relatorios/relatorios.js"></script>
    <script type="module" src="../static/components/dashboard/dashboard.js"></script>
    <script type="module" src="../static/components/colaboradores/colaboradores.js"></script>
    <script type="module" src="../static/components/clientes/clientes.js"></script>
    <script type="module" src="../static/components/vendas/Sales.js"></script>

    <script type="module" src="../static/scripts/index.js"></script>
    <script type="module" src="../static/scripts/classes/ApiConnection.js"></script>


</body>
</html>
