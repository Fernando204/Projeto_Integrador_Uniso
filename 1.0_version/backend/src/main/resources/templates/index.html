<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor</title>
    <link rel="icon" th:href="@{/images/icon-logo.png}" type="image/png">

    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="/components/dashboard/dashboard.css">
    <link rel="stylesheet" href="/components/finanças/finance.css">
    <link rel="stylesheet" href="/components/vendas/sales.css">
    <link rel="stylesheet" href="/components/relatorios/specific/sales.css">
    <link rel="stylesheet" href="/components/clientes/clientes.css">
    <link rel="stylesheet" href="/components/relatorios/relatorios.css">
    <link rel="stylesheet" href="/components/estoque/estoque.css">
    <link rel="stylesheet" href="/components/colaboradores/colaboradores.css">
    <link rel="stylesheet" href="/components/configuracoes/configuracoes.css">
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <nav class="navBar" id="mainNavBar">

        <!-- Header da sidebar: logo + nome -->
        <div class="sidebar-header">
            <img src="/images/main-logo.png" alt="logo" class="sidebar-logo">
            <div class="sidebar-title-group">
                <div class="sidebar-app-name">Microgestor</div>
                <div class="sidebar-app-sub">empresa</div>
            </div>
        </div>

        <!-- Itens de navegação -->
        <div class="nav-scroll">

            <div class="button-box pageButton active" data-id="/dashboard" data-tooltip="Dashboard">
                <span class="material-icons nav-icon">dashboard</span>
                <span class="nav-label">Dashboard</span>
            </div>

            <div class="button-box pageButton" data-id="/financas" data-tooltip="Finanças">
                <span class="material-icons nav-icon">account_balance</span>
                <span class="nav-label">Finanças</span>
            </div>

            <div class="button-box pageButton" data-id="/vendas" data-tooltip="Vender">
                <span class="material-icons nav-icon">point_of_sale</span>
                <span class="nav-label">Vender</span>
            </div>

            <div class="button-box pageButton" data-id="/clientes" data-tooltip="Clientes">
                <span class="material-icons nav-icon">groups</span>
                <span class="nav-label">Clientes</span>
            </div>

            <div class="button-box pageButton" data-id="estoque" data-tooltip="Estoque">
                <span class="material-icons nav-icon">inventory_2</span>
                <span class="nav-label">Estoque</span>
            </div>

            <div class="button-box pageButton" data-id="/relatorios" data-tooltip="Relatórios">
                <span class="material-icons nav-icon">bar_chart</span>
                <span class="nav-label">Relatórios</span>
            </div>

            <div class="button-box pageButton" data-id="/colaboradores" data-tooltip="Colaboradores">
                <span class="material-icons nav-icon">handshake</span>
                <span class="nav-label">Colaboradores</span>
            </div>

        </div>

        <!-- Footer: botão recolher -->
        <div class="sidebar-footer">
            <button class="sidebar-toggle-button" id="sidebarToggleBtn" title="Recolher menu">
                <span class="material-icons toggle-icon">chevron_left</span>
                <span class="toggle-label">Recolher</span>
            </button>
        </div>

    </nav>

    <!-- ===== HEADER ===== -->
    <header class="main-header" id="mainHeader">
        <div class="header-left"></div>
        <div class="header-div">
            <button class="notification-button">
                <span class="material-icons notification-bt">notifications</span>
            </button>
            <button class="user-profile-button">
                <span class="material-icons">account_circle</span>
            </button>
            <button class="settings-button" id="settingsNavBtn" title="Configurações">
                <span class="material-icons">settings</span>
            </button>

            <div class="profile-container right-modal-container" id="user-info-modal">
                <h4>Faça login para acessar seu perfil</h4>
                <button id="gotoLoginBt">Entrar</button>
            </div>

            <div class="notify-container right-modal-container" id="notification-modal">
                <h4>Nenhuma notificação</h4>
            </div>
        </div>
    </header>

    <!-- ===== CONTENT ===== -->
    <section id="site-content" class="loading">
        <div class="loading-icon"></div>
    </section>

    <script type="module" src="scripts/index.js"></script>

</body>
</html>
