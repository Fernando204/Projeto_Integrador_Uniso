<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor - login</title>
    <link rel="icon" href="../../../../../images/icon-logo.png" type="image/png">
    <link rel="stylesheet" href="../styles/authStyle.css">

</head>

<body>

    <div class="split-screen">
        <div class="lateral-container">
            <img th:src="@{/images/main-logo.png}">
            <h1>Controle sua empresa em um só lugar</h1>
        </div>

        <div class="right-side">
            <div class="card login-card">
                <h2>Cadastro de usuário</h2>
                <fieldset>
                    <div class="row">
                        <div class="field">
                            <label for="full-name">Nome completo</label>
                            <input id="full-name" type="text" placeholder="Digite seu nome completo">
                        </div>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" placeholder="Digite seu e-mail">
                        </div>

                        <div class="field">
                            <label for="phone">Telefone</label>
                            <input id="phone" type="number" placeholder="Digite seu telefone">
                        </div>
                    </div>

                    <div class="row">
                        <div class="field">
                            <label for="endereco">Endereço</label>
                            <input id="endereco" type="text" placeholder="Digite seu endereço">
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <div class="row">
                        <div class="field">
                            <label for="company-name">Razão social</label>
                            <input id="company-name" type="text" placeholder="Digite a razão social">
                        </div>

                        <div class="field">
                            <label for="cnpj">CNPJ</label>
                            <input id="cnpj" type="text" placeholder="Digite o CNPJ">
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <div class="row">
                        <div class="field">
                            <label for="password">Senha</label>
                            <input id="password" type="password" placeholder="Digite sua senha">
                        </div>

                        <div class="field">
                            <label for="confirm-password">Confirmar senha</label>
                            <input id="confirm-password" type="password" placeholder="Confirme sua senha">
                        </div>
                    </div>
                </fieldset>

                <button type="submit" id="confirmBt">Cadastrar</button>
                <div class="register-link">
                    <a href="loginPage.html">já tem uma conta? Entrar</a>
                </div>
            </div>
        </div>
    </div>


    <script type="module" src="../scripts/classes/ApiConnection.js"></script>
    <script type="module" src="../scripts/pages/register.js"></script>
</body>

</html>
