<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor - login</title>
    <link rel="icon" href="../images/icon-logo.png" type="image/png">
    <link rel="stylesheet" href="../styles/authStyle.css">

</head>

<body>
    <div class="split-screen">
        <div class="lateral-container">
            <img src="../images/main-logo.png" alt="logo image">
            <h1>Controle sua empresa em um só lugar</h1>
        </div>

        <div class="right-side">
            <div class="card login-card">
                <h2>Login</h2>

                <fieldset>

                    <div class="field">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="Digite seu e-mail">
                    </div>


                    <div class="field">
                        <label for="password">Senha</label>
                        <input id="password" type="password" placeholder="Digite sua senha">
                    </div>




                    <div style="display: flex; flex-direction: row;">

                        <label for="change-password">mostrar senha</label>
                        <input style="margin-left: 10px;" class="change-password" type="checkbox" name="change-password"
                            id="changePasswordInput">
                    </div>
                </fieldset>

                <button type="submit" id="confirmBt">Entrar</button>
                <div class="register-link">
                    <a href="registerPage.html">Não tem uma conta? Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../scripts/classes/ApiConnection.js"></script>
    <script type="module" src="../scripts/pages/login.js"></script>
</body>

</html>
