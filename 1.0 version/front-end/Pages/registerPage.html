<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor - login</title>
    <link rel="icon" href="../images/icon-logo.png" type="image/png">
    <link rel="stylesheet" href="../styles/authStyle.css">

</head>
<body>

    <div class="split-screen">
        <div class="lateral-container">
            <img src="../images/main-logo.png"  alt="logo image">
            <h1>Controle sua empresa em um só lugar</h1>
        </div>

        <div class="right-side">
            <div class="card login-card">
                <h2>Cadastro de usuário</h2>

                 <!-- Informações pessoais -->
                <fieldset>
                    <label for="full-name">Nome completo</label>
                    <input id="full-name" type="text" placeholder="Digite seu nome completo">

                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="Digite seu e-mail">
                </fieldset>

                <!-- Informações da empresa -->
                <fieldset>
                    

                    <label for="company-name">Razão social</label>
                    <input id="company-name" name="company-name" type="text" placeholder="Digite a razão social">

                    <label for="cnpj">CNPJ</label>
                    <input id="cnpj" type="text" placeholder="Digite o CNPJ">
                </fieldset>

                <!-- Senha -->
                <fieldset>
                  

                    <label for="password">Senha</label>
                    <input id="password" type="password" placeholder="Digite sua senha">

                    <label for="confirm-password">Confirmar senha</label>
                    <input id="confirm-password" type="password" placeholder="Confirme sua senha">
                </fieldset>

                <button type="submit" id="confirmBt">Cadastrar</button>
                <div class="register-link">
                    <a href="loginPage.html">já tem uma conta? Entrar</a>
                </div>
            </div>
        </div>
    </div>
    

    <script type="module" src="../scripts/classes/ApiConnection.js"></script>
    <script type="module" src="../scripts/pages/register.js"></script>
</body>
</html>
