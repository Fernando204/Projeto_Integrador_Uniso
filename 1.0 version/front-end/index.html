<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Microgestor</title>
    <link rel="icon" href="images/icon-logo.png" type="image/png">

    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="components/dashboard/dashboard.css">
    <link rel="stylesheet" href="components/finanças/finance.css">
    <link rel="stylesheet" href="components/vendas/sales.css">
    <link rel="stylesheet" href="components/clientes/clientes.css">
    <link rel="stylesheet" href="components/relatorios/relatorios.css">
    <link rel="stylesheet" href="components/estoque/estoque.css">

</head>
<body>
    <header>
        <div></div>
        <div class="header-div">
            <button class="notification-button">
                <span class="material-icons notification-bt" >notifications</span>
            </button>
            <button class="user-profile-button">
                <span class="material-icons">account_circle</span>
            </button>
                <div class="profile-container right-modal-container">
                    <h4>Faça login para acessar seu perfil</h4>
                    <button id="gotoLoginBt">Entrar</button>
                </div>
                <div class="notify-container right-modal-container">
                    <h4>Nenhuma notificação</h4>
                </div>
        </div>
    </header>

    <div class="flex-half-main-container">
        <div class="navBar">
            <img src="images/main-logo.png" alt="logo-image" class="logo-image">
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">dashboard</span>
                </button>
                <h5>Dashboard</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">account_balance</span>
                </button>
                <h5>Finanças</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">point_of_sale</span>
                </button>
                <h5>Vendas</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">groups</span>
                </button>
                <h5>Clientes</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">inventory_2</span>
                </button>
                <h5>Estoque</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">bar_charts</span>
                </button>
                <h5>Relatórios</h5>
            </div>
    
            <div class="button-box pageButton">
                <button>
                    <span class="material-icons">handshake</span>
                </button>
                <h5>Colaboradores</h5>
            </div>
        </div>
    
        <section id="site-content"></section>
    </div>
    

    <script type="module" src="scripts/index.js"></script>
    <script type="module" src="scripts/classes/ApiConnection.js"></script>

    <script src="./components/finanças/finance.js"></script>
    <script src="./components/relatorios/relatorios.js"></script>

</body>
</html>
