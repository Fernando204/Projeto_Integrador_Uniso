<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="images/icon-logo.png" type="image/png">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="components/dashboard/dashboard.css">
    <title>Microgestor</title>
</head>
<body>
    <div class="navBar">
        <img src="images/icon-logo.png" alt="logo-image" class="logo-image">

        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">dashboard</span>
            </button>
            <h5>Dashboard</h5>
        </div>
        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">account_balance</span>
            </button>
            <h5>Finanças</h5>
        </div>
        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">point_of_sale</span>
            </button>
            <h5>Vendas</h5>
        </div>
        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">groups</span>
            </button>
            <h5>Clientes</h5>
        </div>
        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">inventory_2</span>
            </button>
            <h5>Estoque</h5>
        </div>
        <div class="button-box">
            <button class="pageButton">
                <span class="material-icons">bar_charts</span>
            </button>
            <h5>Relatórios</h5>
        </div>
    </div>

    <header>
        <div></div>
        <div class="header-div">
            <button class="notification-button">
                <span class="material-icons">notifications</span>
            </button>
            <button class="user-profile-button">
                <span class="material-icons">account_circle</span>
            </button>
        </div>
    </header>

    
    <section id="site-content" ></section>

    <script src="scripts/index.js"></script>
    <script src="scripts/API.js"></script>
</body>
</html>
