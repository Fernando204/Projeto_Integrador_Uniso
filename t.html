<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="test()">iniciar</button>

    <script>
        let time;
        let start = false;

        function test() {
            if (start) {
                let dif = performance.now() - time;
                alert("Passou: " + (dif / 1000).toFixed(4) + " segundos");
                start = false;
                return;
            }

            time = performance.now();
            start = true;
        }
    </script>
</body>
</html>
